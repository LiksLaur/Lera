<!DOCTYPE html>
   <html>
   <head>
       <title>Django Public Blog - Авторизация</title>
       <style>
           body { font-family: Arial, sans-serif; margin: 20px; }
           .content { margin-top: 20px; }
           input[type="text"], input[type="password"] { width: 100%; margin-bottom: 10px; }
           .errors { color: red; }
       </style>
   </head>
   <body>
       <div class="content">
           <h1>Авторизация</h1>
           <form method="POST">
               {% csrf_token %}
               {{ form.username }}
               {{ form.password }}
               <input type="submit" value="Войти">
           </form>
           {% if form.errors %}
               <div class="errors">Нет аккаунта с таким сочетанием имени и пароля.</div>
           {% endif %}
       </div>
   </body>
   </html>
