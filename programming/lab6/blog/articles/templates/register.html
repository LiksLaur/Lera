<!DOCTYPE html>
   <html>
   <head>
       <title>Django Public Blog - Регистрация</title>
       <style>
           body { font-family: Arial, sans-serif; margin: 20px; }
           .content { margin-top: 20px; }
           input[type="text"], input[type="email"], input[type="password"] { width: 100%; margin-bottom: 10px; }
.errors { color: red; }
       </style>
   </head>
   <body>
       <div class="content">
           <h1>Регистрация</h1>
           <form method="POST">
               {% csrf_token %}
               {{ form.username }}
               {{ form.email }}
               {{ form.password1 }}
               {{ form.password2 }}
               <input type="submit" value="Зарегистрироваться">
           </form>
           {% if form.errors %}
               <div class="errors">
                   {% for field in form %}
                       {{ field.errors }}
                   {% endfor %}
                   {{ form.non_field_errors }}
               </div>
           {% endif %}
       </div>
   </body>
   </html>
