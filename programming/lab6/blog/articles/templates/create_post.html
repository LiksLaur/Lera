{% load static %}
<!DOCTYPE html>
   <html>
   <head>
       <title>Django Public Blog - создать статью</title>
                  
        <link rel="stylesheet"  href="{% static 'cp.css' %}">
   </head>
   <body>
       <div class="content">
           <h1>Написать статью</h1>
           <form method="POST">
               {% csrf_token %}
               {{ form.title }}
               {{ form.text }}
               <input type="submit" value="Сохранить">
           </form>
           {% if form.errors %}
               <div class="errors">
                   {% for field in form %}
                       {{ field.errors }}
                   {% endfor %}
                   {{ form.non_field_errors }}
               </div>
           {% endif %}
       </div>
   </body>
   </html>
