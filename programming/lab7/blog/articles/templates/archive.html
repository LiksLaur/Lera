   {% load static %}
   <!DOCTYPE html>
   <html>
   <head>
       <title>Архив всех статей</title>
       <link rel="stylesheet"  href="{% static 'cp.css' %}">
   </head>
   <body>
    <div class="header">
       <h1>Django public blog</h1>
       <div style="float: right;">
           {% if user.is_authenticated %}
               <a href="{% url 'logout' %}" style="color: white;">Выход</a>
           {% else %}
               <a href="{% url 'register' %}" style="color: white;">Регистрация</a> |
               <a href="{% url 'login' %}" style="color: white;">Вход</a>
               
           {% endif %}
       </div>
   </div>
       <div class="header">
       </div>
       <div>
           {% for post in posts %}
           <div class="one-post">
               <h2><a href="{% url 'get_article' post.id %}" style="color: white;">{{ post.title }}</a></h2>
               <p class="article-created-date">Дата: {{ post.created_date }}</p>
               <button class="fold-button">свернуть</button>
           </div>
           {% endfor %}
       </div>
        <script src="{% static 'js/fold-post.js' %}"></script>
   </body>
   </html>
