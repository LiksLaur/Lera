{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{% static 'cp.css' %}">
</head>
<body>
    <div class="header">
        <img class="logo" src="{% static 'img/2023_04_VTRf8XTF-3_png.png' %}" alt="">
        <div class="header-text-area">
            <h1 class="service-title">Django public blog</h1>
            {% if user.is_authenticated %}
                <a href="{% url 'logout' %}" class="register-link">Выход</a>
            {% else %}
                <a href="{% url 'register' %}" class="register-link">Регистрация</a> |
                <a href="{% url 'login' %}" class="register-link">Вход</a>
            {% endif %}
        </div>
        <div class="icons-for-parallax">
            <img class="icon-for-parallax-first" src="{% static 'img/2023_04_VTRf8XTF-3_png.png' %}" alt="">
            <img class="icon-for-parallax-second" src="{% static 'img/2023_04_VTRf8XTF-3_png.png' %}" alt="">
            <img class="icon-for-parallax-third" src="{% static 'img/2023_04_VTRf8XTF-3_png.png' %}" alt="">
        </div>
    </div>
    <div class="content">
        {% for post in posts %}
        <div class="one-post">
            <div class="one-post-shadow"></div>
            <h2><a href="{% url 'get_article' post.id %}">{{ post.title }}</a></h2>
            <p class="article-created-date">Дата: {{ post.created_date }}</p>
            <button class="fold-button">свернуть</button>
        </div>
        {% endfor %}
    </div>
    <script src="{% static 'js/jquery-4.0.0.min.js' %}"></script>
    <script src="{% static 'js/helloworld.js' %}"></script>
    <script src="{% static 'js/fold-post.js' %}"></script>
    <script src="{% static 'js/highlight.js' %}"></script>
</body>
</html>
